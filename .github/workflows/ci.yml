name: CI

# Safety gate: run the full test suite (unit + real-DB integration) on every
# push to main and every PR. A red run flags a broken change before it ships.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: clean_freaks_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Throwaway CI database — never production.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/clean_freaks_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Unit tests
        run: npm test

      - name: Integration tests (real Postgres)
        run: npm run test:integration
